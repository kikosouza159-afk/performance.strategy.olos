<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or 'Dashboard Flask' }}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <style>
    :root {
      --bg: #0b1220;
      --bg-2: #111827;
      --panel: rgba(17, 24, 39, 0.92);
      --panel-soft: rgba(31, 41, 55, 0.95);
      --line: rgba(148,163,184,.18);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --green: #22c55e;
      --yellow: #facc15;
      --red: #ef4444;
      --blue: #38bdf8;
      --radius: 22px;
      --shadow: 0 18px 40px rgba(0,0,0,.25);
      --sidebar-w: 240px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--text);
    }
    a { color: inherit; text-decoration: none; }
    .app { min-height: 100vh; display: flex; }
    .sidebar {
      width: var(--sidebar-w);
      position: fixed;
      inset: 0 auto 0 0;
      background: rgba(8, 15, 30, 0.98);
      border-right: 1px solid var(--line);
      padding: 24px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .brand {
      padding: 10px 12px 18px;
      border-bottom: 1px solid var(--line);
    }
    .brand-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .brand-sub { color: var(--muted); font-size: 12px; line-height: 1.4; }
    .menu { display: grid; gap: 10px; }
    .menu a {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 14px; border-radius: 16px;
      border: 1px solid transparent; color: #cbd5e1; font-weight: 700;
      background: transparent;
    }
    .menu a:hover { background: rgba(148,163,184,.08); border-color: var(--line); }
    .menu a.active { background: linear-gradient(135deg, rgba(56,189,248,.16), rgba(34,197,94,.14)); border-color: rgba(56,189,248,.25); color: white; }
    .menu .ico { width: 34px; height: 34px; border-radius: 12px; display: grid; place-items: center; background: rgba(56,189,248,.12); border: 1px solid rgba(56,189,248,.18); }
    .sidebar-foot { margin-top: auto; color: var(--muted); font-size: 12px; padding: 0 10px; }
    .main { flex: 1; margin-left: var(--sidebar-w); }
    .wrap { max-width: 1520px; margin: 0 auto; padding: 28px; }
    .hero { display: flex; justify-content: space-between; align-items: center; gap: 18px; margin-bottom: 24px; }
    .title h1 { margin: 0 0 8px; font-size: 24px; }
    .title p { margin: 0; color: var(--muted); }
    .badge {
      background: rgba(34, 197, 94, .12);
      border: 1px solid rgba(34, 197, 94, .25);
      color: #bbf7d0;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      white-space: nowrap;
    }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
    .card { padding: 20px; }
    .error { padding: 18px; border-radius: 18px; background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.28); color: #fecaca; font-weight: 700; }
    .field-grid { display: flex; flex-wrap: wrap; gap: 14px; align-items: end; }
    .field { display: flex; flex-direction: column; gap: 8px; min-width: 220px; }
    .field label { font-size: 12px; color: var(--muted); font-weight: 700; }
    .field select, .field input, .field button {
      background: #0b1220; color: var(--text); border: 1px solid var(--line);
      border-radius: 14px; padding: 12px 14px; font-size: 14px;
    }
    .field button { border: none; cursor: pointer; font-weight: 700; background: linear-gradient(135deg, #0ea5e9 0%, #22c55e 100%); }
    .section-title { margin: 0 0 14px; font-size: 20px; }
    .table-wrap { position: relative; margin-top: 10px; max-height: 420px; overflow: auto; border-radius: 16px; border: 1px solid var(--line); background: rgba(15, 23, 42, 0.55); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 12px 10px; border-bottom: 1px solid var(--line); text-align: right; white-space: nowrap; }
    th:first-child, td:first-child { text-align: left; }
    th { color: #cbd5e1; background: rgba(17, 24, 39, 0.98); position: sticky; top: 0; z-index: 2; }
    .status.positivo { color: #22c55e; }
    .status.negativo { color: #ef4444; }
    @media (max-width: 1180px) {
      .sidebar { position: static; width: 100%; height: auto; }
      .main { margin-left: 0; }
      .app { display: block; }
      .menu { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">Painel Ope.</div>
        <div class="brand-sub">Excel + Flask com navegação entre dashboards.</div>
      </div>
      <nav class="menu">
        <a href="/" class="{% if page == 'dashboard' %}active{% endif %}"><span class="ico">📊</span><span>Dashboard</span></a>
        <a href="/comparativo" class="{% if page == 'comparativo' %}active{% endif %}"><span class="ico">🔀</span><span>Comparativo</span></a>
        <a href="/tabulacao" class="{% if page == 'tabulacao' %}active{% endif %}"><span class="ico">🧾</span><span>Tabulação</span></a>
      </nav>
      <div class="sidebar-foot">Leitura única da mesma base, sem precisar duplicar estrutura.</div>
    </aside>
    <main class="main">
      <div class="wrap">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
